<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="Inter, Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B1220"/><stop offset="1" stop-color="#111A2E"/>
    </linearGradient>
    <filter id="sh" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="arw" markerWidth="12" markerHeight="12" refX="8" refY="6" orient="auto">
      <path d="M0 0 L10 6 L0 12 z" fill="#64748B"/>
    </marker>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)"/>
  <text x="600" y="48" text-anchor="middle" fill="#E2E8F0" font-size="27" font-weight="700">O loop de decisão do tabletop</text>
  <text x="600" y="78" text-anchor="middle" fill="#94A3B8" font-size="15">Cada rodada é um ciclo: a crise avança, a plateia escolhe, e a escolha coletiva vira consequência.</text>

  <!-- Arcos do ciclo (setas entre os 4 nós) -->
  <path d="M 600 168 A 250 200 0 0 1 850 350" fill="none" stroke="#334155" stroke-width="3" marker-end="url(#arw)"/>
  <path d="M 850 400 A 250 200 0 0 1 600 592" fill="none" stroke="#334155" stroke-width="3" marker-end="url(#arw)"/>
  <path d="M 600 592 A 250 200 0 0 1 350 400" fill="none" stroke="#334155" stroke-width="3" marker-end="url(#arw)"/>
  <path d="M 350 350 A 250 200 0 0 1 600 168" fill="none" stroke="#334155" stroke-width="3" marker-end="url(#arw)"/>

  <!-- Nó 1: Injeção (topo) -->
  <g filter="url(#sh)">
    <rect x="450" y="120" width="300" height="96" rx="14" fill="#0F172A"/>
    <rect x="450" y="120" width="300" height="6" rx="3" fill="#FB7185"/>
    <text x="600" y="152" text-anchor="middle" fill="#FDA4AF" font-size="13" font-weight="700">1 · INJEÇÃO DA CRISE</text>
    <text x="600" y="178" text-anchor="middle" fill="#E2E8F0" font-size="13.5">Um novo fato explode na tela</text>
    <text x="600" y="200" text-anchor="middle" fill="#94A3B8" font-size="12">(detecção · deepfake do CEO · pressão externa)</text>
  </g>

  <!-- Nó 2: Opções (direita) -->
  <g filter="url(#sh)">
    <rect x="800" y="304" width="300" height="140" rx="14" fill="#0F172A"/>
    <rect x="800" y="304" width="300" height="6" rx="3" fill="#FCD34D"/>
    <text x="950" y="336" text-anchor="middle" fill="#FBBF24" font-size="13" font-weight="700">2 · AS OPÇÕES NA MESA</text>
    <g fill="#CBD5E1" font-size="12.5" text-anchor="middle">
      <text x="950" y="364">Conter? Comunicar?</text>
      <text x="950" y="388">Pagar? Acionar a autoridade?</text>
      <text x="950" y="418" fill="#94A3B8">Nenhuma escolha é de graça —</text>
      <text x="950" y="436" fill="#94A3B8">toda opção tem um custo.</text>
    </g>
  </g>

  <!-- Nó 3: Votação (base) -->
  <g filter="url(#sh)">
    <rect x="450" y="524" width="300" height="140" rx="14" fill="#0F172A"/>
    <rect x="450" y="524" width="300" height="6" rx="3" fill="#34D399"/>
    <text x="600" y="556" text-anchor="middle" fill="#6EE7B7" font-size="13" font-weight="700">3 · A PLATEIA VOTA</text>
    <g fill="#CBD5E1" font-size="12.5" text-anchor="middle">
      <text x="600" y="584">✋ mãos · 🟥🟩 cartões · 📱 QR</text>
      <text x="600" y="612">A decisão é coletiva, ao vivo</text>
      <text x="600" y="640" fill="#94A3B8">200 pessoas, uma escolha só.</text>
    </g>
  </g>

  <!-- Nó 4: Consequência (esquerda) -->
  <g filter="url(#sh)">
    <rect x="100" y="304" width="300" height="140" rx="14" fill="#0F172A"/>
    <rect x="100" y="304" width="300" height="6" rx="3" fill="#38BDF8"/>
    <text x="250" y="336" text-anchor="middle" fill="#7DD3FC" font-size="13" font-weight="700">4 · A CONSEQUÊNCIA</text>
    <g fill="#CBD5E1" font-size="12.5" text-anchor="middle">
      <text x="250" y="364">A tela revela o que aconteceu</text>
      <text x="250" y="388">por causa da escolha da sala</text>
      <text x="250" y="418" fill="#94A3B8">…e isso alimenta a</text>
      <text x="250" y="436" fill="#94A3B8">próxima injeção.</text>
    </g>
  </g>

  <!-- Centro -->
  <g filter="url(#sh)">
    <circle cx="600" cy="384" r="86" fill="#1E1B4B"/>
    <circle cx="600" cy="384" r="86" fill="none" stroke="#A78BFA" stroke-width="2" opacity="0.6"/>
    <text x="600" y="366" text-anchor="middle" fill="#C4B5FD" font-size="14" font-weight="700">Resposta a</text>
    <text x="600" y="386" text-anchor="middle" fill="#C4B5FD" font-size="14" font-weight="700">incidente é</text>
    <text x="600" y="406" text-anchor="middle" fill="#F5F3FF" font-size="15" font-weight="700">DECISÃO DE</text>
    <text x="600" y="426" text-anchor="middle" fill="#F5F3FF" font-size="15" font-weight="700">NEGÓCIO</text>
  </g>

  <text x="600" y="686" text-anchor="middle" fill="#64748B" font-size="12.5">O ciclo repete 3 vezes. Ao final, o debrief compara o que a plateia decidiu com as boas práticas.</text>
</svg>
