<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="Inter, Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B1220"/><stop offset="1" stop-color="#111A2E"/>
    </linearGradient>
    <linearGradient id="prm" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2E1065"/><stop offset="1" stop-color="#A78BFA"/></linearGradient>
    <filter id="sh" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <text x="600" y="48" text-anchor="middle" fill="#E2E8F0" font-size="27" font-weight="700">Modelo leve de governança de IA corporativa</text>
  <text x="600" y="78" text-anchor="middle" fill="#94A3B8" font-size="15">Sem juridiquês nem burocracia: quatro pilares que qualquer empresa aplica — de qualquer porte.</text>

  <!-- 4 pilares -->
  <g>
    <!-- Pilar 1 -->
    <g filter="url(#sh)">
      <rect x="56" y="112" width="264" height="230" rx="14" fill="#0F172A"/>
      <rect x="56" y="112" width="264" height="46" rx="14" fill="url(#prm)"/>
      <text x="188" y="141" text-anchor="middle" fill="#F5F3FF" font-size="15" font-weight="700">👥 Papéis &amp; responsáveis</text>
      <g fill="#E2E8F0" font-size="12.5">
        <text x="78" y="192">Quem responde pela IA?</text>
        <text x="78" y="220" fill="#C4B5FD">▸ Um dono para cada IA em uso</text>
        <text x="78" y="246" fill="#C4B5FD">▸ Quem pode aprovar novos usos</text>
        <text x="78" y="272" fill="#C4B5FD">▸ A quem reportar um problema</text>
      </g>
      <text x="78" y="314" fill="#94A3B8" font-size="11.5">"IA sem dono é IA sem controle."</text>
    </g>
    <!-- Pilar 2 -->
    <g filter="url(#sh)">
      <rect x="336" y="112" width="264" height="230" rx="14" fill="#0F172A"/>
      <rect x="336" y="112" width="264" height="46" rx="14" fill="url(#prm)"/>
      <text x="468" y="141" text-anchor="middle" fill="#F5F3FF" font-size="15" font-weight="700">📋 Política de uso</text>
      <g fill="#E2E8F0" font-size="12.5">
        <text x="358" y="192">O que pode e o que não pode</text>
        <text x="358" y="220" fill="#C4B5FD">▸ Ferramentas de IA aprovadas</text>
        <text x="358" y="246" fill="#C4B5FD">▸ Dados proibidos de colar</text>
        <text x="358" y="272" fill="#C4B5FD">▸ Uma página, linguagem simples</text>
      </g>
      <text x="358" y="314" fill="#94A3B8" font-size="11.5">Combate a shadow AI e o vazamento.</text>
    </g>
    <!-- Pilar 3 -->
    <g filter="url(#sh)">
      <rect x="616" y="112" width="264" height="230" rx="14" fill="#0F172A"/>
      <rect x="616" y="112" width="264" height="46" rx="14" fill="url(#prm)"/>
      <text x="748" y="141" text-anchor="middle" fill="#F5F3FF" font-size="15" font-weight="700">🧑‍⚖️ Humano no loop</text>
      <g fill="#E2E8F0" font-size="12.5">
        <text x="638" y="192">A IA sugere; a pessoa decide</text>
        <text x="638" y="220" fill="#C4B5FD">▸ Aprovação humana no que é crítico</text>
        <text x="638" y="246" fill="#C4B5FD">▸ Pagar/transferir nunca no automático</text>
        <text x="638" y="272" fill="#C4B5FD">▸ Validar a saída antes de usar</text>
      </g>
      <text x="638" y="314" fill="#94A3B8" font-size="11.5">Barra o deepfake e a ação indevida.</text>
    </g>
    <!-- Pilar 4 -->
    <g filter="url(#sh)">
      <rect x="896" y="112" width="248" height="230" rx="14" fill="#0F172A"/>
      <rect x="896" y="112" width="248" height="46" rx="14" fill="url(#prm)"/>
      <text x="1020" y="141" text-anchor="middle" fill="#F5F3FF" font-size="15" font-weight="700">🤝 Fornecedor seguro</text>
      <g fill="#E2E8F0" font-size="12.5">
        <text x="918" y="192">Contratar IA com critério</text>
        <text x="918" y="220" fill="#C4B5FD">▸ Onde ficam os meus dados?</text>
        <text x="918" y="246" fill="#C4B5FD">▸ Treinam o modelo com eles?</text>
        <text x="918" y="272" fill="#C4B5FD">▸ Cláusulas de LGPD e segurança</text>
      </g>
      <text x="918" y="314" fill="#94A3B8" font-size="11.5">Due diligence antes de assinar.</text>
    </g>
  </g>

  <!-- Espinha NIST AI RMF -->
  <text x="600" y="392" text-anchor="middle" fill="#7DD3FC" font-size="14" font-weight="700">Apoiado em frameworks reconhecidos — traduzidos para o dia a dia</text>
  <g filter="url(#sh)">
    <rect x="56" y="408" width="1088" height="150" rx="14" fill="#111A2E"/>
    <text x="80" y="440" fill="#38BDF8" font-size="14" font-weight="700">NIST AI RMF</text>
    <g>
      <rect x="80" y="454" width="248" height="82" rx="10" fill="#0C4A6E" opacity="0.35"/>
      <text x="204" y="480" text-anchor="middle" fill="#7DD3FC" font-size="14" font-weight="700">GOVERN</text>
      <text x="204" y="504" text-anchor="middle" fill="#CBD5E1" font-size="11.5">Papéis, política e cultura</text>
      <text x="204" y="522" text-anchor="middle" fill="#CBD5E1" font-size="11.5">(pilares 1 e 2)</text>
    </g>
    <g>
      <rect x="340" y="454" width="248" height="82" rx="10" fill="#0C4A6E" opacity="0.35"/>
      <text x="464" y="480" text-anchor="middle" fill="#7DD3FC" font-size="14" font-weight="700">MAP</text>
      <text x="464" y="504" text-anchor="middle" fill="#CBD5E1" font-size="11.5">Onde uso IA e o que arrisca</text>
      <text x="464" y="522" text-anchor="middle" fill="#CBD5E1" font-size="11.5">(inventário / shadow AI)</text>
    </g>
    <g>
      <rect x="600" y="454" width="248" height="82" rx="10" fill="#0C4A6E" opacity="0.35"/>
      <text x="724" y="480" text-anchor="middle" fill="#7DD3FC" font-size="14" font-weight="700">MEASURE</text>
      <text x="724" y="504" text-anchor="middle" fill="#CBD5E1" font-size="11.5">Acompanhar e validar</text>
      <text x="724" y="522" text-anchor="middle" fill="#CBD5E1" font-size="11.5">(humano no loop)</text>
    </g>
    <g>
      <rect x="860" y="454" width="264" height="82" rx="10" fill="#0C4A6E" opacity="0.35"/>
      <text x="992" y="480" text-anchor="middle" fill="#7DD3FC" font-size="14" font-weight="700">MANAGE</text>
      <text x="992" y="504" text-anchor="middle" fill="#CBD5E1" font-size="11.5">Tratar riscos e fornecedores</text>
      <text x="992" y="522" text-anchor="middle" fill="#CBD5E1" font-size="11.5">(pilar 4)</text>
    </g>
  </g>
  <text x="600" y="586" text-anchor="middle" fill="#A5B4FC" font-size="12.5" font-weight="600">Compatível com a ISO/IEC 42001 (gestão de IA) e com a LGPD — sem precisar virar especialista.</text>

  <!-- Faixa inferior -->
  <g filter="url(#sh)">
    <rect x="60" y="616" width="1080" height="76" rx="14" fill="#1E1B4B" opacity="0.92"/>
    <text x="600" y="662" text-anchor="middle" fill="#C4B5FD" font-size="16" font-weight="700">Governança não é freio — é o que dá à sua empresa o direito de escalar a IA com segurança.</text>
  </g>
</svg>
