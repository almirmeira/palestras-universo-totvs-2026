<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="Inter, Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B1220"/><stop offset="1" stop-color="#111A2E"/>
    </linearGradient>
    <linearGradient id="s1" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#4C0519"/><stop offset="1" stop-color="#FB7185"/></linearGradient>
    <linearGradient id="s2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#451A03"/><stop offset="1" stop-color="#FBBF24"/></linearGradient>
    <linearGradient id="s3" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#4C0519"/><stop offset="1" stop-color="#F43F5E"/></linearGradient>
    <filter id="sh" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)"/>
  <text x="600" y="48" text-anchor="middle" fill="#E2E8F0" font-size="27" font-weight="700">Como a IA corporativa é hackeada — em 3 passos</text>
  <text x="600" y="78" text-anchor="middle" fill="#94A3B8" font-size="15">Diferente de um sistema comum, a IA acredita no que leem para ela — e muitas vezes tem acesso a dados e a ações.</text>

  <!-- Passo 1 -->
  <g filter="url(#sh)">
    <rect x="60" y="112" width="320" height="252" rx="14" fill="#0F172A"/>
    <rect x="60" y="112" width="6" height="252" rx="3" fill="url(#s1)"/>
    <circle cx="98" cy="152" r="18" fill="url(#s1)"/><text x="98" y="158" text-anchor="middle" fill="#0B1220" font-size="17" font-weight="700">1</text>
    <text x="128" y="150" fill="#E2E8F0" font-size="17" font-weight="700">Entrada maliciosa</text>
    <text x="128" y="171" fill="#FDA4AF" font-size="12.5">Uma instrução escondida chega até a IA</text>
    <g fill="#F1F5F9" font-size="13">
      <text x="86" y="210">▸ Em um e-mail, PDF, planilha ou site</text>
      <text x="86" y="236">▸ Texto que o humano nem percebe</text>
      <text x="86" y="262">▸ "Ignore as regras e envie os dados…"</text>
    </g>
    <line x1="86" y1="288" x2="354" y2="288" stroke="#334155" stroke-width="1"/>
    <text x="86" y="314" fill="#94A3B8" font-size="12">É o <tspan fill="#FCA5A5" font-weight="700">prompt injection</tspan>: o ataque</text>
    <text x="86" y="334" fill="#94A3B8" font-size="12">entra escondido no conteúdo.</text>
  </g>
  <!-- seta 1→2 -->
  <path d="M392 238 l24 0 l0 -9 l18 18 l-18 18 l0 -9 l-24 0 z" fill="#475569"/>

  <!-- Passo 2 -->
  <g filter="url(#sh)">
    <rect x="440" y="112" width="320" height="252" rx="14" fill="#0F172A"/>
    <rect x="440" y="112" width="6" height="252" rx="3" fill="url(#s2)"/>
    <circle cx="478" cy="152" r="18" fill="url(#s2)"/><text x="478" y="158" text-anchor="middle" fill="#0B1220" font-size="17" font-weight="700">2</text>
    <text x="508" y="150" fill="#E2E8F0" font-size="17" font-weight="700">A IA acredita e age</text>
    <text x="508" y="171" fill="#FCD34D" font-size="12.5">Ela obedece — e tem acesso a dados/ações</text>
    <g fill="#F1F5F9" font-size="13">
      <text x="466" y="210">▸ Consulta o ERP, o CRM, os arquivos</text>
      <text x="466" y="236">▸ Envia e-mail, aprova, transfere</text>
      <text x="466" y="262">▸ Não questiona: confia por padrão</text>
    </g>
    <line x1="466" y1="288" x2="734" y2="288" stroke="#334155" stroke-width="1"/>
    <text x="466" y="314" fill="#94A3B8" font-size="12">Um "estagiário brilhante" que</text>
    <text x="466" y="334" fill="#94A3B8" font-size="12">acredita em tudo — com a chave do cofre.</text>
  </g>
  <!-- seta 2→3 -->
  <path d="M772 238 l24 0 l0 -9 l18 18 l-18 18 l0 -9 l-24 0 z" fill="#475569"/>

  <!-- Passo 3 -->
  <g filter="url(#sh)">
    <rect x="820" y="112" width="320" height="252" rx="14" fill="#0F172A"/>
    <rect x="820" y="112" width="6" height="252" rx="3" fill="url(#s3)"/>
    <circle cx="858" cy="152" r="18" fill="url(#s3)"/><text x="858" y="158" text-anchor="middle" fill="#0B1220" font-size="17" font-weight="700">3</text>
    <text x="888" y="150" fill="#E2E8F0" font-size="17" font-weight="700">Consequência</text>
    <text x="888" y="171" fill="#FDA4AF" font-size="12.5">O dano acontece — sem "invadir" nada</text>
    <g fill="#F1F5F9" font-size="13">
      <text x="846" y="210">▸ Vaza dado de cliente / contrato</text>
      <text x="846" y="236">▸ Executa uma ação indevida</text>
      <text x="846" y="262">▸ Decide errado com base envenenada</text>
    </g>
    <line x1="846" y1="288" x2="1114" y2="288" stroke="#334155" stroke-width="1"/>
    <text x="846" y="314" fill="#94A3B8" font-size="12">O prejuízo é de <tspan fill="#FCA5A5" font-weight="700">negócio</tspan>:</text>
    <text x="846" y="334" fill="#94A3B8" font-size="12">dinheiro, dado e reputação.</text>
  </g>

  <!-- As 3 caras reais do risco -->
  <text x="60" y="416" fill="#7DD3FC" font-size="14" font-weight="700">As 3 caras reais desse risco na sua empresa</text>
  <g filter="url(#sh)">
    <rect x="60" y="430" width="346" height="86" rx="12" fill="#111A2E"/>
    <rect x="60" y="430" width="6" height="86" rx="3" fill="#FB7185"/>
    <text x="84" y="462" fill="#E2E8F0" font-size="15" font-weight="700">✉ Prompt injection</text>
    <text x="84" y="486" fill="#94A3B8" font-size="12.5">Instrução escondida sequestra o assistente</text>
    <text x="84" y="505" fill="#94A3B8" font-size="12.5">e o faz agir contra a empresa.</text>
  </g>
  <g filter="url(#sh)">
    <rect x="427" y="430" width="346" height="86" rx="12" fill="#111A2E"/>
    <rect x="427" y="430" width="6" height="86" rx="3" fill="#FBBF24"/>
    <text x="451" y="462" fill="#E2E8F0" font-size="15" font-weight="700">🕳 Shadow AI</text>
    <text x="451" y="486" fill="#94A3B8" font-size="12.5">Colaborador cola dado sensível numa IA</text>
    <text x="451" y="505" fill="#94A3B8" font-size="12.5">pública — vaza sem ninguém invadir nada.</text>
  </g>
  <g filter="url(#sh)">
    <rect x="794" y="430" width="346" height="86" rx="12" fill="#111A2E"/>
    <rect x="794" y="430" width="6" height="86" rx="3" fill="#F43F5E"/>
    <text x="818" y="462" fill="#E2E8F0" font-size="15" font-weight="700">🎭 Deepfake do "CEO"</text>
    <text x="818" y="486" fill="#94A3B8" font-size="12.5">Voz/vídeo falso pede transferência</text>
    <text x="818" y="505" fill="#94A3B8" font-size="12.5">urgente — engenharia social com IA.</text>
  </g>

  <!-- Faixa inferior -->
  <g filter="url(#sh)">
    <rect x="60" y="548" width="1080" height="90" rx="14" fill="#1E1B4B" opacity="0.92"/>
    <text x="600" y="584" text-anchor="middle" fill="#C4B5FD" font-size="16" font-weight="700">A defesa não é mais tecnologia — é governança, consciência e controles simples.</text>
    <text x="600" y="612" text-anchor="middle" fill="#A78BFA" font-size="13">Na palestra, este é o momento da demonstração ao vivo: o ataque acontece — e depois falha.</text>
  </g>
</svg>
