<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="Inter, Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B1220"/><stop offset="1" stop-color="#111A2E"/>
    </linearGradient>
    <linearGradient id="ok" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#064E3B"/><stop offset="1" stop-color="#34D399"/></linearGradient>
    <linearGradient id="no" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#4C0519"/><stop offset="1" stop-color="#FB7185"/></linearGradient>
    <linearGradient id="prm" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2E1065"/><stop offset="1" stop-color="#A78BFA"/></linearGradient>
    <filter id="sh" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)"/>
  <text x="600" y="48" text-anchor="middle" fill="#E2E8F0" font-size="27" font-weight="700">Uso consciente de IA — e o plano dos primeiros 90 dias</text>
  <text x="600" y="78" text-anchor="middle" fill="#94A3B8" font-size="15">O que todo colaborador leva para a mesa dele na segunda-feira. Prático, sem depender de time técnico.</text>

  <!-- Pode -->
  <g filter="url(#sh)">
    <rect x="56" y="108" width="366" height="292" rx="14" fill="#0F172A"/>
    <rect x="56" y="108" width="366" height="46" rx="14" fill="url(#ok)"/>
    <text x="239" y="137" text-anchor="middle" fill="#ECFDF5" font-size="16" font-weight="700">✔ Boas práticas</text>
    <g fill="#D1FAE5" font-size="13.5">
      <text x="80" y="190">✓ Use só ferramentas de IA aprovadas</text>
      <text x="80" y="222">✓ Anonimize/retire dados antes de colar</text>
      <text x="80" y="254">✓ Sempre valide a resposta antes de usar</text>
      <text x="80" y="286">✓ Trate a IA como estagiário brilhante</text>
      <text x="98" y="308" fill="#6EE7B7" font-size="12.5">e ingênuo: confira o que ela entrega</text>
      <text x="80" y="340">✓ Na dúvida, pergunte ao dono da IA</text>
      <text x="80" y="372">✓ Reporte qualquer resposta estranha</text>
    </g>
  </g>

  <!-- Não pode -->
  <g filter="url(#sh)">
    <rect x="438" y="108" width="366" height="292" rx="14" fill="#0F172A"/>
    <rect x="438" y="108" width="366" height="46" rx="14" fill="url(#no)"/>
    <text x="621" y="137" text-anchor="middle" fill="#FFF1F2" font-size="16" font-weight="700">✖ Nunca faça</text>
    <g fill="#FECDD3" font-size="13.5">
      <text x="462" y="190">✗ Colar dado de cliente, contrato ou senha</text>
      <text x="462" y="222">✗ Confiar numa saída sem checar a fonte</text>
      <text x="462" y="254">✗ Aprovar transferência pedida por áudio/</text>
      <text x="480" y="276" fill="#FDA4AF" font-size="12.5">vídeo (pode ser deepfake do "chefe")</text>
      <text x="462" y="308">✗ Instalar plugin/IA fora da lista aprovada</text>
      <text x="462" y="340">✗ Deixar a IA agir sozinha no que é crítico</text>
      <text x="462" y="372">✗ Achar que "comigo não acontece"</text>
    </g>
  </g>

  <!-- Regra de ouro -->
  <g filter="url(#sh)">
    <rect x="820" y="108" width="324" height="292" rx="14" fill="#111A2E"/>
    <rect x="820" y="108" width="6" height="292" rx="3" fill="#A78BFA"/>
    <text x="844" y="150" fill="#C4B5FD" font-size="15" font-weight="700">A regra de ouro</text>
    <text x="844" y="196" fill="#E2E8F0" font-size="16" font-weight="700">Se você não</text>
    <text x="844" y="222" fill="#E2E8F0" font-size="16" font-weight="700">mandaria por</text>
    <text x="844" y="248" fill="#E2E8F0" font-size="16" font-weight="700">e-mail a um</text>
    <text x="844" y="274" fill="#E2E8F0" font-size="16" font-weight="700">estranho…</text>
    <text x="844" y="312" fill="#A78BFA" font-size="16" font-weight="700">não cole numa IA.</text>
    <line x1="844" y1="336" x2="1120" y2="336" stroke="#2E1065" stroke-width="1"/>
    <text x="844" y="364" fill="#94A3B8" font-size="12.5">Consciência protege mais que</text>
    <text x="844" y="384" fill="#94A3B8" font-size="12.5">qualquer ferramenta cara.</text>
  </g>

  <!-- Plano 30/60/90 -->
  <text x="60" y="446" fill="#7DD3FC" font-size="15" font-weight="700">Plano 30 · 60 · 90 dias — comece pequeno, comece já</text>
  <g filter="url(#sh)">
    <rect x="56" y="460" width="352" height="176" rx="14" fill="#0F172A"/>
    <circle cx="96" cy="500" r="24" fill="#0C4A6E"/><text x="96" y="506" text-anchor="middle" fill="#7DD3FC" font-size="17" font-weight="700">30</text>
    <text x="132" y="498" fill="#E2E8F0" font-size="15" font-weight="700">Enxergar</text>
    <text x="132" y="518" fill="#94A3B8" font-size="12">dias</text>
    <g fill="#CBD5E1" font-size="12.5">
      <text x="80" y="556">▸ Publicar a política de uso (1 página)</text>
      <text x="80" y="582">▸ Inventariar quais IAs já são usadas</text>
      <text x="80" y="608">▸ Achar a shadow AI escondida</text>
    </g>
  </g>
  <g filter="url(#sh)">
    <rect x="424" y="460" width="352" height="176" rx="14" fill="#0F172A"/>
    <circle cx="464" cy="500" r="24" fill="#3730A3"/><text x="464" y="506" text-anchor="middle" fill="#C7D2FE" font-size="17" font-weight="700">60</text>
    <text x="500" y="498" fill="#E2E8F0" font-size="15" font-weight="700">Controlar</text>
    <text x="500" y="518" fill="#94A3B8" font-size="12">dias</text>
    <g fill="#CBD5E1" font-size="12.5">
      <text x="448" y="556">▸ Nomear donos para cada IA</text>
      <text x="448" y="582">▸ Exigir humano no loop no crítico</text>
      <text x="448" y="608">▸ Treinar o time (uso consciente)</text>
    </g>
  </g>
  <g filter="url(#sh)">
    <rect x="792" y="460" width="352" height="176" rx="14" fill="#0F172A"/>
    <circle cx="832" cy="500" r="24" fill="#2E1065"/><text x="832" y="506" text-anchor="middle" fill="#C4B5FD" font-size="17" font-weight="700">90</text>
    <text x="868" y="498" fill="#E2E8F0" font-size="15" font-weight="700">Amadurecer</text>
    <text x="868" y="518" fill="#94A3B8" font-size="12">dias</text>
    <g fill="#CBD5E1" font-size="12.5">
      <text x="816" y="556">▸ Due diligence dos fornecedores</text>
      <text x="816" y="582">▸ Revisar incidentes e ajustar</text>
      <text x="816" y="608">▸ Medir e reportar à liderança</text>
    </g>
  </g>

  <text x="600" y="676" text-anchor="middle" fill="#64748B" font-size="12.5">Cada área sai da sessão com 1 ação anotada. Governança de IA é um hábito — não um projeto de uma vez só.</text>
</svg>
