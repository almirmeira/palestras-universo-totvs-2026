    <text x="856" y="376" fill="#C4B5FD" font-size="12">▸ O profissional de segurança do futuro</text>
    <line x1="856" y1="398" x2="1106" y2="398" stroke="#2E1065" stroke-width="1"/>
    <text x="856" y="426" fill="#94A3B8" font-size="12">Reaproveita: advisory-conselhos,</text>
    <text x="856" y="444" fill="#94A3B8" font-size="12">Governança de IA para Boards,</text>
    <text x="856" y="462" fill="#94A3B8" font-size="12">pilulas-executivos, grc-ia-multicloud</text>
