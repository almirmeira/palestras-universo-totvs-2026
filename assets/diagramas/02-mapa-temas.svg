  <text x="981" y="540" text-anchor="middle" fill="#C4B5FD" font-size="12">único desenhado para este palco</text>

  <text x="600" y="700" text-anchor="middle" fill="#64748B" font-size="12">Todos os temas: ~45–60 min · parte prática/aplicada obrigatória</text>
</svg>
